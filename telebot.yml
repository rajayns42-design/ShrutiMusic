version: "1.0"
bot_name: "Anu_Support_Bot"
runtime:
  language: "python"
  version: "3.10"

commands:
  install: "pip install -r requirements.txt"
  start: "python3 main.py"

env:
  - name: "API_ID"
    required: true
  - name: "API_HASH"
    required: true
  - name: "BOT_TOKEN"
    required: true
  - name: "MONGO_DB_URI"
    required: true
  - name: "SESSION_STRING"
    required: true
  - name: "SUPPORT_CHANNEL"
    required: true
  - name: "SUPPORT_CHAT"
    required: true
  - name: "LOGGER_ID"
    required: true
  - name: "OWNER_ID"
    required: true

deployment:
  auto_restart: true
  health_check: "/health"
